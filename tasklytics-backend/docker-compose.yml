version: "3.9"

services:

  db:
    image: postgres:15
    container_name: tasklytics_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: npg_QdFI4Eet6phB
      POSTGRES_DB: tasklytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: tasklytics_backend
    depends_on:
      - db

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
        "

volumes:
  postgres_data:

